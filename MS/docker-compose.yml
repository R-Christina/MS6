services:
  ms6-validator:
    image: ms6-validator:latest
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8006:8000"
    environment:
      - PYTHONPATH=/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ms6-validator-test:
    image: ms6-validator:latest
    build:
      context: .
      dockerfile: dockerfile
    environment:
      - PYTHONPATH=/app/src
    command: pytest tests/ -v --tb=short