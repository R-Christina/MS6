name: MS6 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r MS/requirements.txt
          pip install pytest pytest-cov flake8

      # TEST + COVERAGE (IMPORTANT: cd MS pour éviter chemins cassés)
      - name: Run tests with coverage
        run: |
          cd MS
          PYTHONPATH=src pytest tests/ -v \
            --cov=src \
            --cov-config=pyproject.toml \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --junitxml=tests.xml

      - name: Debug coverage output
        run: |
          ls -R MS/reports
          cat MS/reports/coverage.xml | head -50

      # FLAKE8
      - name: Flake8 scan
        run: |
          cd MS
          flake8 src --statistics | tee reports/flake8.txt || true

      # SNYK
      - name: Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=MS/requirements.txt > MS/reports/snyk.txt || true

      # SONARCLOUD
      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          args: >
            -Dsonar.projectKey=R-Christina_MS6
            -Dsonar.organization=r-christina
            -Dsonar.projectBaseDir=MS
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.coverage.exclusions=**/__init__.py
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ARTIFACTS
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: MS/reports/