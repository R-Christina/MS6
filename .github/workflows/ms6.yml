name: MS6 Debug Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show full repo structure
        run: tree -a

      - name: Check MS folder
        run: |
          ls -R MS

      - name: Check src folder
        run: |
          ls -R MS/src || echo "MS/src NOT FOUND"

      - name: Check tests folder
        run: |
          ls -R MS/tests || echo "MS/tests NOT FOUND"

      - name: Check requirements
        run: |
          cat MS/requirements.txt || echo "requirements.txt NOT FOUND"