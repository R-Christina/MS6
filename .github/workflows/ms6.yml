name: MS6 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      # TEST + COVERAGE
      - name: Run tests with coverage
        run: |
          mkdir -p reports
          PYTHONPATH=src pytest tests/ -v \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --junitxml=reports/tests.xml
          python -c "import xml.etree.ElementTree as ET; ET.parse('reports/coverage.xml'); print('XML valid')"

      - name: Check coverage report exists
        run: |
          ls -la reports/coverage.xml
          echo "Coverage report path: $(pwd)/reports/coverage.xml"
          cat reports/coverage.xml | head -50

      # FLAKE8
      - name: Flake8 scan
        run: |
          flake8 src --statistics | tee reports/flake8.txt || true

      # SNYK
      - name: Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt > reports/snyk.txt || true

      # SONARCLOUD
      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: MS
          args: >
            -Dsonar.projectKey=R-Christina_MS6
            -Dsonar.organization=r-christina
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ARTIFACTS
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: MS/reports/