name: MS6 DevSecOps Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: MS
        run: docker build -t ms6 .

      - name: Run tests with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/MS:/app \
            ms6 pytest tests/ -v \
            --junitxml=/app/rapport_tests.xml \
            --cov=/app/src/domain \
            --cov-report=xml:/app/coverage.xml \
            --cov-report=term | tee MS/rapport_tests.txt

      - name: Check coverage.xml exists
        run: ls -la MS/ && cat MS/coverage.xml | head -10

      # Remplace /app/src par src pour que SonarCloud trouve les fichiers
      - name: Fix coverage paths for SonarCloud
        run: |
          sed -i "s|<source>/app/src</source>|<source>${{ github.workspace }}/MS/src</source>|g" MS/coverage.xml
          echo "--- coverage.xml après fix ---"
          cat MS/coverage.xml | head -15

      - name: Flake8 scan avant
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/MS:/app \
            ms6 flake8 /app/src/ --statistics \
            | tee MS/flake8_avant.txt || true

      - name: Snyk scan avant
        working-directory: MS
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt > snyk_avant.txt || true

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: MS

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: |
            MS/rapport_tests.txt
            MS/rapport_tests.xml
            MS/coverage.xml
            MS/flake8_avant.txt
            MS/snyk_avant.txt