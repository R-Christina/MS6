name: MS6 DevSecOps Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: MS
        run: docker build -t ms6 .

      - name: Run tests with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/MS:/app \
            ms6 pytest tests/ -v \
            --junitxml=/app/rapport_tests.xml \
            --cov=src \
            --cov-report=xml:/app/coverage.xml \
            --cov-report=term | tee MS/rapport_tests.txt

      - name: Check coverage.xml exists
        run: |
          ls -la MS/
          head -20 MS/coverage.xml

      # 🔥 FIX IMPORTANT : rendre les paths compatibles Sonar
      - name: Fix coverage paths for SonarCloud
        run: |
          sed -i 's|/app/src|src|g' MS/coverage.xml
          echo "---- coverage fixed ----"
          head -20 MS/coverage.xml

      - name: Flake8 scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/MS:/app \
            ms6 flake8 /app/src/ --statistics \
            | tee MS/flake8_avant.txt || true

      - name: Snyk scan
        working-directory: MS
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt > snyk_avant.txt || true

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: MS
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: |
            MS/rapport_tests.txt
            MS/rapport_tests.xml
            MS/coverage.xml
            MS/flake8_avant.txt
            MS/snyk_avant.txt