name: MS6 DevSecOps Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      # TEST + COVERAGE
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          mkdir -p reports
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term \
            --junitxml=reports/tests.xml
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 5 ]; then
            echo "No tests collected — coverage will be 0%"
            exit 0
          fi
          exit $EXIT_CODE

      - name: Fix coverage source path
        run: |
          sed -i "s|<source>src</source>|<source>/github/workspace/MS/src</source>|" reports/coverage.xml
          grep "<source>" reports/coverage.xml
      # FLAKE8
      - name: Flake8 scan
        run: |
          flake8 src --statistics | tee reports/flake8.txt || true

      # SNYK
      - name: Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt > reports/snyk.txt || true

      # SONARCLOUD
      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: MS
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ARTIFACTS
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: MS/reports/